name: Publish NuGet Package

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Read VersionPrefix from csproj
        id: version
        run: |
          PREFIX=$(grep '<VersionPrefix>' src/PowerPortalsPro.Dataverse.Linq/PowerPortalsPro.Dataverse.Linq.csproj | sed 's/.*<VersionPrefix>\(.*\)<\/VersionPrefix>.*/\1/')
          VERSION="${PREFIX}.${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Extract release notes from CHANGELOG
        id: notes
        shell: bash
        run: |
          # Use the hand-written notes under the "## [Unreleased]" heading (everything up
          # to the next version heading). Fails early — before publishing — if empty, so a
          # release can't go out without notes.
          NOTES=$(awk '
            /^## \[Unreleased\]/ { capture = 1; next }
            /^## \[/            { capture = 0 }
            capture
          ' CHANGELOG.md | sed '/./,$!d')

          if [ -z "$(printf '%s' "$NOTES" | tr -d '[:space:]')" ]; then
            echo "::error::No release notes found under '## [Unreleased]' in CHANGELOG.md. Add them before running this workflow."
            exit 1
          fi

          {
            echo "notes<<NOTESEOF"
            echo "$NOTES"
            echo "NOTESEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build
        run: dotnet build src/PowerPortalsPro.Dataverse.Linq/PowerPortalsPro.Dataverse.Linq.csproj -c Release -p:Version=${{ steps.version.outputs.version }}

      - name: Pack
        run: dotnet pack src/PowerPortalsPro.Dataverse.Linq/PowerPortalsPro.Dataverse.Linq.csproj -c Release -p:Version=${{ steps.version.outputs.version }} --no-build --output ./nupkg

      - name: Push to NuGet.org
        run: dotnet nuget push ./nupkg/PowerPortalsPro.Dataverse.Linq.${{ steps.version.outputs.version }}.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate --no-symbols

      - name: Stamp CHANGELOG with released version
        shell: bash
        run: |
          DATE=$(date +%Y-%m-%d)
          VERSION=${{ steps.version.outputs.version }}

          # Promote the hand-written [Unreleased] notes to a versioned section by inserting
          # a version heading directly beneath [Unreleased], which leaves the existing notes
          # under the new version and resets [Unreleased] to empty.
          {
            echo ""
            echo "## [$VERSION] - $DATE"
          } > /tmp/changelog_entry.txt

          sed -i '/## \[Unreleased\]/r /tmp/changelog_entry.txt' CHANGELOG.md

      - name: Commit CHANGELOG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "Update CHANGELOG for v${{ steps.version.outputs.version }}"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: ${{ steps.notes.outputs.notes }}
          files: ./nupkg/PowerPortalsPro.Dataverse.Linq.${{ steps.version.outputs.version }}.nupkg
