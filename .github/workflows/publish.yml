name: Publish NuGet Package

on:
  push:
    branches: [main]
    paths:
      - 'src/PowerPortalsPro.Dataverse.Linq/**'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Read VersionPrefix from csproj
        id: version
        run: |
          PREFIX=$(grep '<VersionPrefix>' src/PowerPortalsPro.Dataverse.Linq/PowerPortalsPro.Dataverse.Linq.csproj | sed 's/.*<VersionPrefix>\(.*\)<\/VersionPrefix>.*/\1/')
          VERSION="${PREFIX}.${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Collect commit messages since last release
        id: changes
        run: |
          # Find the most recent release tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -n "$LAST_TAG" ]; then
            echo "Last release tag: $LAST_TAG"
            COMMITS=$(git log "${LAST_TAG}..HEAD" --format="- %s" --no-merges)
          else
            echo "No previous release tag found, using all commits"
            COMMITS=$(git log --format="- %s" --no-merges)
          fi

          # Write to output using delimiter to handle multiline
          {
            echo "commits<<COMMITSEOF"
            echo "$COMMITS"
            echo "COMMITSEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build
        run: dotnet build src/PowerPortalsPro.Dataverse.Linq/PowerPortalsPro.Dataverse.Linq.csproj -c Release -p:Version=${{ steps.version.outputs.version }}

      - name: Pack
        run: dotnet pack src/PowerPortalsPro.Dataverse.Linq/PowerPortalsPro.Dataverse.Linq.csproj -c Release -p:Version=${{ steps.version.outputs.version }} --no-build --output ./nupkg

      - name: Push to NuGet.org
        run: dotnet nuget push ./nupkg/PowerPortalsPro.Dataverse.Linq.${{ steps.version.outputs.version }}.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate --no-symbols

      - name: Update CHANGELOG
        shell: bash
        run: |
          DATE=$(date +%Y-%m-%d)
          VERSION=${{ steps.version.outputs.version }}

          COMMITS=$(cat <<'COMMITSEOF'
          ${{ steps.changes.outputs.commits }}
          COMMITSEOF
          )

          # Build the new entry as a temp file to avoid sed escaping issues
          {
            echo ""
            echo "## [$VERSION] - $DATE"
            echo ""
            echo "$COMMITS"
          } > /tmp/changelog_entry.txt

          # Insert after [Unreleased] line
          sed -i '/## \[Unreleased\]/r /tmp/changelog_entry.txt' CHANGELOG.md

      - name: Commit CHANGELOG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "Update CHANGELOG for v${{ steps.version.outputs.version }}"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: ${{ steps.changes.outputs.commits }}
          files: ./nupkg/PowerPortalsPro.Dataverse.Linq.${{ steps.version.outputs.version }}.nupkg
